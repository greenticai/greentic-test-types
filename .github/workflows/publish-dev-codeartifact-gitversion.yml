name: Publish test-types dev (GitVersion -> CodeArtifact)

on:
  push:
    branches: ["develop"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: "6.x"

      - id: gitversion
        uses: gittools/actions/gitversion/execute@v3

      - uses: dtolnay/rust-toolchain@stable

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set dev version from GitVersion + run number
        run: |
          VERSION="${{ steps.gitversion.outputs.majorMinorPatch }}-dev.${{ github.run_number }}"
          sed -i -E "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          echo "Publishing version: ${VERSION}"
          grep '^version =' Cargo.toml

      - name: Configure Cargo registry
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'EOF'
          [registries.corp-artifacts-greentic-test]
          index = "sparse+https://corp-artifacts-599558443099.d.codeartifact.eu-north-1.amazonaws.com/cargo/greentic/"
          credential-provider = "cargo:token"
          EOF

      - name: Fetch CodeArtifact token
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain corp-artifacts \
            --domain-owner 599558443099 \
            --region eu-north-1 \
            --query authorizationToken \
            --output text)
          echo "::add-mask::$TOKEN"
          echo "CARGO_REGISTRIES_CORP_ARTIFACTS_GREENTIC_TEST_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Publish crate (dev)
        run: cargo publish --registry corp-artifacts-greentic-test --allow-dirty
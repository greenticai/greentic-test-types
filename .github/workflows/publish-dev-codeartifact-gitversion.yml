name: Publish test-types dev (GitVersion -> CodeArtifact)

on:
  push:
    branches: ["develop"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: "6.x"

      - id: gitversion
        uses: gittools/actions/gitversion/execute@v3

      - uses: dtolnay/rust-toolchain@stable

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set version in Cargo.toml
        id: ver
        run: |
          VERSION="${{ steps.gitversion.outputs.majorMinorPatch }}-dev.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          sed -i -E "s/^version\s*=\s*\".*\"/version = \"${VERSION}\"/" Cargo.toml
          echo "Publishing version: ${VERSION}"
          grep '^version\s*=\s*' Cargo.toml

      - name: Fetch CodeArtifact token
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain corp-artifacts \
            --domain-owner 599558443099 \
            --region eu-north-1 \
            --query authorizationToken \
            --output text)
          echo "::add-mask::$TOKEN"
          echo "CARGO_REGISTRIES_CORP_ARTIFACTS_GREENTIC_TEST_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Publish crate (gate)
        run: cargo publish --registry corp-artifacts-greentic-test --allow-dirty

      - name: Create git tag only after successful publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.version }}"
          if gh api "repos/${{ github.repository }}/git/ref/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists"
          else
            gh api "repos/${{ github.repository }}/git/refs" -X POST -f ref="refs/tags/${TAG}" -f sha="${GITHUB_SHA}"
            echo "Created tag ${TAG}"
          fi
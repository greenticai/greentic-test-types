name: Publish test-types to CodeArtifact

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Crate version to publish (example: 0.1.1-dev.1)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Set crate version from input
        run: |
          sed -i -E 's/^version = ".*"/version = "${{ inputs.version }}"/' Cargo.toml
          grep '^version =' Cargo.toml

      - name: Configure Cargo registry
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'EOF'
          [registries.corp-artifacts-greentic-test]
          index = "sparse+https://corp-artifacts-599558443099.d.codeartifact.eu-north-1.amazonaws.com/cargo/greentic/"
          credential-provider = "cargo:token"
          EOF

      - name: Fetch CodeArtifact token
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain corp-artifacts \
            --domain-owner 599558443099 \
            --region eu-north-1 \
            --query authorizationToken \
            --output text)
          echo "CARGO_REGISTRIES_CORP_ARTIFACTS_GREENTIC_TEST_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Publish crate
        run: cargo publish --registry corp-artifacts-greentic-test --allow-dirty